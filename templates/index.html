<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PurrBox</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink:        #f472b6;
      --pink-light:  #fce7f3;
      --pink-mid:    #fbcfe8;
      --pink-dark:   #be185d;
      --bg:          #fdf4f8;
      --card:        #fff8fb;
      --border:      #fce7f3;
      --text:        #4a2040;
      --muted:       #b07090;
      --green:       #86efac;
      --shadow:      0 4px 24px rgba(244,114,182,0.10);
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
 
    /* ── Header ── */
    header {
      width: 100%;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      color: var(--pink);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo svg { width: 22px; height: 22px; }
 
    /* ── Main ── */
    main {
      width: 100%;
      max-width: 420px;
      padding: 28px 16px 60px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
 
    /* ── Status badge ── */
    .status-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #86efac;
      box-shadow: 0 0 0 3px rgba(134,239,172,0.3);
      animation: pulse 2s infinite;
    }
    .status-dot-offline { 
        background: #f16b6b;
        box-shadow: 0 0 0 3px rgba(252,165,165,0.3);
        animation: none; 
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(134,239,172,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(134,239,172,0.1); }
    }
 
 
    /* ── Feed card ── */
    .feed-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
    }
 
    /* Feed button */
    .feed-btn {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--pink-mid);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(244,114,182,0.25);
      position: relative;
    }
    .feed-btn:hover  { background: var(--pink); box-shadow: 0 6px 24px rgba(244,114,182,0.45); transform: scale(1.04); }
    .feed-btn:active { transform: scale(0.97); }
    .feed-btn.feeding { background: var(--pink); animation: feedPulse 0.6s ease; }
    @keyframes feedPulse {
      0%   { box-shadow: 0 0 0 0   rgba(244,114,182,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(244,114,182,0); }
      100% { box-shadow: 0 0 0 0   rgba(244,114,182,0); }
    }
    .feed-btn svg { width: 36px; height: 36px; color: var(--pink-dark); }
    .feed-btn span {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--pink-dark);
      letter-spacing: 0.04em;
    }
 
    .next-meal {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .next-meal strong { color: var(--text); font-weight: 600; }
 
    /* Divider */
    .divider { width: 100%; height: 1px; background: var(--border); }
 
    /* Slider section */
    .slider-section { width: 100%; }
    .slider-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .slider-label { font-size: 0.82rem; font-weight: 600; color: var(--text); }
    .slider-subtitle { font-size: 0.72rem; color: var(--muted); }
    .meal-count {
      background: var(--pink-dark);
      color: #fff;
      font-size: 0.78rem;
      font-weight: 700;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--pink-dark) 0%, var(--pink-dark) var(--fill, 30%), var(--pink-mid) var(--fill, 30%), var(--pink-mid) 100%);
      outline: none;
      margin: 14px 0 8px;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--pink-dark);
      box-shadow: 0 2px 8px rgba(190,24,93,0.35);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
 
    .slider-ticks {
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
    }
    .slider-ticks span {
      font-size: 0.65rem;
      color: var(--muted);
      width: 14px;
      text-align: center;
    }
 
    /* ── Footer ── */
    footer {
      width: 100%;
      border-top: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      font-size: 0.72rem;
      color: var(--muted);
    }
    footer .logo { font-size: 0.9rem; }
  </style>
</head>
<body>
    <main>
        <header>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/><path d="M8.5 5.5C8.5 4.67 9.17 4 10 4s1.5.67 1.5 1.5S10.83 7 10 7 8.5 6.33 8.5 5.5zm5 0C13.5 4.67 14.17 4 15 4s1.5.67 1.5 1.5S15.83 7 15 7s-1.5-.67-1.5-1.5z"/></svg>
                PurrBox
            </div>
        </header>
        
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">System Ready</span>
        </div>
        
        <!-- <div class="container">
            <button id="powerBtn" value="off" onclick="activerPower()">Power</button>
            <div id="status"></div>
        </div> -->
        
        <!-- Feed card -->
        <div class="feed-card" >
            
            <!-- Feed Now button -->
            <button class="feed-btn" id="powerBtn" onclick="activerPower()">
                <!-- Paw icon -->
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="6"  cy="7"  r="1.6"/>
                    <circle cx="10" cy="5.5" r="1.4"/>
                    <circle cx="14" cy="5.5" r="1.4"/>
                    <circle cx="18" cy="7"  r="1.6"/>
                    <path d="M12 8.5c-3 0-5.5 2.2-5.5 5 0 2 1.2 3.5 3 3.5.8 0 1.5-.3 2.5-.3s1.7.3 2.5.3c1.8 0 3-1.5 3-3.5 0-2.8-2.5-5-5.5-5z"/>
                </svg>
                <span>On</span>
            </button>
            
            <p class="next-meal">Next scheduled meal: <strong id="nextMeal">–</strong></p>
        </div>

        <div class="divider"></div>
        
        <!-- Slider -->
        <div class="slider-section">
            <div class="slider-header">
                <div>
                    <div class="slider-label">Daily Meal Limit</div>
                    <div class="slider-subtitle">Optimal for weight management</div>
                </div>
                <div class="meal-count" id="mealCountBadge">4</div>
            </div>
            <input type="range" id="mealSlider" min="1" max="10" value="4" oninput="updateSlider(this)" onchange="saveMealLimit(this.value)" />
            <div class="slider-ticks">
            <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
            <span>6</span><span>7</span><span>8</span><span>9</span><span>10</span>
            </div>
        </div>
        
        <footer>
            <div class="logo">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:16px;height:16px"><circle cx="6" cy="7" r="1.6"/><circle cx="10" cy="5.5" r="1.4"/><circle cx="14" cy="5.5" r="1.4"/><circle cx="18" cy="7" r="1.6"/><path d="M12 8.5c-3 0-5.5 2.2-5.5 5 0 2 1.2 3.5 3 3.5.8 0 1.5-.3 2.5-.3s1.7.3 2.5.3c1.8 0 3-1.5 3-3.5 0-2.8-2.5-5-5.5-5z"/></svg>
            PurrBox
            </div>
            <span>© 2024 PurrBox. Nurturing your feline companion.</span>
        </footer>
    </main>
    
    <script>
        function activerPower() {
            const powerBtn = document.getElementById('powerBtn');
            const currentState = powerBtn.value;
            
            if (currentState === 'off') {
                powerBtn.value = 'on';
                    powerBtn.textContent = 'On';
                    commande('on');
                } else {
                    powerBtn.value = 'off';
                    powerBtn.textContent = 'Off';
                    commande('off');
                }
            }
        async function commande(etat) {
            const statusDiv = document.getElementById('statusDot');
            try {
                const response = await fetch('http://10.10.21.160:5000/rgb', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ etat: etat })
                });

                const data = await response.json();
                
                if (response.ok) {
                    // statusDiv.textContent = `Erreur: ${data.Erreur || 'Erreur inconnue'}`;
                    statusDiv.className = 'status-dot-offline';
                } else {
                    // statusDiv.textContent = `Rgb est a ${etat}`;
                    statusDiv.className = 'status-dot';
                }
            } catch (error) {
                // statusDiv.textContent = `Erreur: ${error.message}`;
                statusDiv.className = 'status-dot-offline';
            }
        }
    </script>
</body>

</html>
